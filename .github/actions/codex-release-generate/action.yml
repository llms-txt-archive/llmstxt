name: "Codex Generate Release"
description: "Run Codex to generate commit/release text from a docs snapshot diff, validate, and split outputs"
author: "llmstxt"
runs:
  using: "composite"
  steps:
    - name: Run Codex
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.openai_api_key }}
        prompt-file: ${{ inputs.prompt_file }}
        output-file: ${{ inputs.output_file }}
        working-directory: ${{ inputs.working_directory }}
        sandbox: read-only
        safety-strategy: drop-sudo
        model: ${{ inputs.model }}
        effort: ${{ inputs.effort }}
        codex-args: >-
          ["--ephemeral"]

    - name: Validate structured output
      shell: bash
      env:
        SUMMARY_JSON: ${{ inputs.output_file }}
        VALIDATOR_SCRIPT: ${{ inputs.validator_script }}
      run: |
        set -euo pipefail
        python3 "$VALIDATOR_SCRIPT" "$SUMMARY_JSON"
    - id: split
      name: Split outputs
      shell: bash
      env:
        SUMMARY_JSON: ${{ inputs.output_file }}
        EMITTER_SCRIPT: ${{ inputs.emitter_script }}
      run: |
        set -euo pipefail
        outdir="${RUNNER_TEMP:-$PWD}"
        python3 "$EMITTER_SCRIPT" "$SUMMARY_JSON" "$outdir" "$GITHUB_OUTPUT"

inputs:
  openai_api_key:
    description: "OpenAI API key"
    required: true
  prompt_file:
    description: "Prompt file path"
    required: true
  working_directory:
    description: "Working directory for Codex"
    required: true
  output_file:
    description: "Where to write the JSON output"
    required: true
  model:
    description: "Model name"
    required: true
  effort:
    description: "Reasoning effort"
    required: true
  validator_script:
    description: "Path to the structured output validator script"
    required: true
  emitter_script:
    description: "Path to the output emission helper script"
    required: true

outputs:
  commit_title:
    description: "Commit title text"
    value: ${{ steps.split.outputs.commit_title }}
  commit_body:
    description: "Commit body text"
    value: ${{ steps.split.outputs.commit_body }}
  release_title:
    description: "Release title text"
    value: ${{ steps.split.outputs.release_title }}
  release_notes_file:
    description: "Path to the release notes markdown file"
    value: ${{ steps.split.outputs.release_notes_file }}
