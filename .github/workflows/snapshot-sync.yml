name: Snapshot Sync

on:
  workflow_call:
    inputs:
      source_url:
        required: true
        type: string
      site_name:
        required: true
        type: string
      site_url:
        required: true
        type: string
      repo_title:
        required: true
        type: string
      schedule_label:
        required: true
        type: string
      tool_ref:
        required: true
        type: string
      release_history_limit:
        required: false
        type: number
        default: 5
    secrets:
      tool_repo_token:
        required: false
      OPENAI_API_KEY:
        required: false

permissions:
  contents: write

concurrency:
  group: snapshot-sync-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODEX_MODEL: ${{ vars.CODEX_MODEL || 'gpt-5.4' }}
      CODEX_EFFORT: ${{ vars.CODEX_EFFORT || 'high' }}

    steps:
      - name: Check out snapshot repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Check out tool repository
        uses: actions/checkout@v5
        with:
          repository: f-pisani/claudecodedocs
          ref: ${{ inputs.tool_ref }}
          path: .toolrepo
          fetch-depth: 1
          token: ${{ secrets.tool_repo_token || github.token }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version-file: .toolrepo/go.mod

      - name: Install tool binaries
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install ./cmd/claudecodedocs
          go install ./cmd/snapshotreadme
        working-directory: .toolrepo

      - name: Copy workflow assets from tool repo
        run: |
          cp .toolrepo/templates/snapshot-readme.md.tmpl "$RUNNER_TEMP/snapshot-readme.md.tmpl"
          cp .toolrepo/.github/codex/prompts/docs-diff-summary.md "$RUNNER_TEMP/codex-docs-diff-summary.md"
          cp .toolrepo/.github/codex/schemas/docs-diff-summary.schema.json "$RUNNER_TEMP/codex-docs-diff-summary.schema.json"

      - name: Resolve latest release state
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=1" 2>/dev/null || echo '[]')"
          latest_tag="$(printf '%s' "$release_json" | jq -r '.[0].tag_name // ""')"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          printf '%s' "$release_json" > "$RUNNER_TEMP/latest-release.json"

          if [ -n "$latest_tag" ]; then
            mkdir -p "$RUNNER_TEMP/previous-release"
            gh release download "$latest_tag" -R "$GITHUB_REPOSITORY" -p manifest.json -D "$RUNNER_TEMP/previous-release" || true
          fi

      - name: Run crawler
        id: crawl
        run: |
          manifest_args=()
          if [ -f "$RUNNER_TEMP/previous-release/manifest.json" ]; then
            manifest_args+=( -previous-manifest "$RUNNER_TEMP/previous-release/manifest.json" )
          fi

          set +e
          claudecodedocs \
            -source "${{ inputs.source_url }}" \
            -out "$RUNNER_TEMP/generated" \
            -layout root \
            -manifest-out "$RUNNER_TEMP/manifest.json" \
            -diagnostics-dir "$RUNNER_TEMP/crawl-diagnostics" \
            -concurrency 8 \
            -timeout 30s \
            "${manifest_args[@]}" \
            > "$RUNNER_TEMP/crawl.stdout" \
            2> "$RUNNER_TEMP/crawl.stderr"
          exit_code=$?
          set -e

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ -f "$RUNNER_TEMP/manifest.json" ]; then
            echo "manifest_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "manifest_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload crawl diagnostics
        if: steps.crawl.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-sync-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/crawl.stdout
            ${{ runner.temp }}/crawl.stderr
            ${{ runner.temp }}/manifest.json
            ${{ runner.temp }}/crawl-diagnostics

      - name: Stop on crawl failure
        if: steps.crawl.outputs.exit_code != '0'
        run: |
          echo "Crawler failed; diagnostics artifact uploaded."
          cat "$RUNNER_TEMP/crawl.stderr"
          exit 1

      - name: Sync raw generated files into repo root
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'README.md' \
            "$RUNNER_TEMP/generated"/ ./

      - name: Remove tool checkout from snapshot worktree
        run: rm -rf .toolrepo

      - name: Detect raw content changes
        id: detect
        run: |
          if [ -z "$(git status --porcelain -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo')" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Fetch release history
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=${{ inputs.release_history_limit }}" > "$RUNNER_TEMP/releases.json"

      - name: Compute release envelope
        if: steps.detect.outputs.changed == 'true'
        id: release_envelope
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ -z "${{ steps.release_state.outputs.latest_tag }}" ]; then
            codex_enabled="false"
            release_tag="initial"
          else
            codex_enabled="true"
            timestamp="$(date -u +"%Y%m%dT%H%M%SZ")"
            release_tag="snapshot-${timestamp}"
          fi

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"

          echo "codex_enabled=$codex_enabled" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

      - name: Prepare Codex input
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/codex-input/snapshot"

          git status --porcelain -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo' > "$RUNNER_TEMP/codex-input/snapshot-status.txt"
          git diff --stat -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo' > "$RUNNER_TEMP/codex-input/snapshot-diffstat.txt"
          git diff -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo' > "$RUNNER_TEMP/codex-input/snapshot.patch"

          cp "$RUNNER_TEMP/manifest.json" "$RUNNER_TEMP/codex-input/snapshot/manifest.json"

          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg site_name "${{ inputs.site_name }}" \
            --arg site_url "${{ inputs.site_url }}" \
            --arg source_url "${{ inputs.source_url }}" \
            --arg release_tag "${{ steps.release_envelope.outputs.release_tag }}" \
            --arg published_at "${{ steps.release_envelope.outputs.published_at }}" \
            '{
              repository: $repository,
              site_name: $site_name,
              site_url: $site_url,
              source_url: $source_url,
              release_tag: $release_tag,
              published_at: $published_at
            }' > "$RUNNER_TEMP/codex-input/snapshot-context.json"

      - name: Validate Codex configuration
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for non-initial snapshot releases." >&2
            exit 1
          fi

      - name: Run Codex release generation
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/codex-docs-diff-summary.md
          output-file: ${{ runner.temp }}/codex-docs-summary.json
          working-directory: ${{ runner.temp }}/codex-input
          output-schema-file: ${{ runner.temp }}/codex-docs-diff-summary.schema.json
          sandbox: read-only
          safety-strategy: drop-sudo
          model: ${{ env.CODEX_MODEL }}
          effort: ${{ env.CODEX_EFFORT }}
          codex-args: >-
            ["--skip-git-repo-check","--ephemeral"]

      - name: Split Codex outputs
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        run: |
          jq -r '.commit_title' "$RUNNER_TEMP/codex-docs-summary.json" > "$RUNNER_TEMP/codex-commit-title.txt"
          jq -r '.commit_body' "$RUNNER_TEMP/codex-docs-summary.json" > "$RUNNER_TEMP/codex-commit-body.txt"
          jq -r '.release_title' "$RUNNER_TEMP/codex-docs-summary.json" > "$RUNNER_TEMP/codex-release-title.txt"
          jq -r '.release_notes_markdown' "$RUNNER_TEMP/codex-docs-summary.json" > "$RUNNER_TEMP/codex-release-notes.md"
          jq -r '.key_changes[]' "$RUNNER_TEMP/codex-docs-summary.json" > "$RUNNER_TEMP/codex-key-changes.txt"

      - name: Upload Codex outputs
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-codex-output-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/codex-docs-summary.json
            ${{ runner.temp }}/codex-commit-title.txt
            ${{ runner.temp }}/codex-commit-body.txt
            ${{ runner.temp }}/codex-release-title.txt
            ${{ runner.temp }}/codex-release-notes.md
            ${{ runner.temp }}/codex-key-changes.txt

      - name: Finalize release metadata
        if: steps.detect.outputs.changed == 'true'
        id: release_meta
        run: |
          commit_message_path="$RUNNER_TEMP/commit-message.txt"
          release_notes_path="$RUNNER_TEMP/release-notes.md"

          if [ "${{ steps.release_envelope.outputs.codex_enabled }}" = "true" ]; then
            commit_subject="$(cat "$RUNNER_TEMP/codex-commit-title.txt")"
            commit_body="$(cat "$RUNNER_TEMP/codex-commit-body.txt")"
            release_name="$(cat "$RUNNER_TEMP/codex-release-title.txt")"
            cp "$RUNNER_TEMP/codex-release-notes.md" "$release_notes_path"
          else
            commit_subject="initial snapshot"
            commit_body=""
            release_name="Initial release"
            printf '## Summary\n\nInitial automated snapshot release.\n' > "$release_notes_path"
          fi

          {
            printf '%s\n' "$commit_subject"
            if [ -n "$commit_body" ]; then
              printf '\n%s\n' "$commit_body"
            fi
          } > "$commit_message_path"

          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "commit_message_path=$commit_message_path" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=$release_notes_path" >> "$GITHUB_OUTPUT"

      - name: Build README release context
        if: steps.detect.outputs.changed == 'true'
        run: |
          jq \
            --arg name "${{ steps.release_meta.outputs.release_name }}" \
            --arg tag "${{ steps.release_envelope.outputs.release_tag }}" \
            --arg published "${{ steps.release_envelope.outputs.published_at }}" \
            --arg url "${{ steps.release_envelope.outputs.release_url }}" \
            '([{
              name: $name,
              tag_name: $tag,
              published_at: $published,
              html_url: $url
            }] + .)' \
            "$RUNNER_TEMP/releases.json" > "$RUNNER_TEMP/releases-with-current.json"

      - name: Render generated README
        if: steps.detect.outputs.changed == 'true'
        run: |
          document_count="$(jq -r '.document_count' "$RUNNER_TEMP/manifest.json")"
          skipped_count="$(jq -r '.skipped_count // 0' "$RUNNER_TEMP/manifest.json")"

          snapshotreadme \
            -template "$RUNNER_TEMP/snapshot-readme.md.tmpl" \
            -out "README.md" \
            -title "${{ inputs.repo_title }}" \
            -site-name "${{ inputs.site_name }}" \
            -site-url "${{ inputs.site_url }}" \
            -source-url "${{ inputs.source_url }}" \
            -schedule-label "${{ inputs.schedule_label }}" \
            -document-count "$document_count" \
            -skipped-count "$skipped_count" \
            -releases-json "$RUNNER_TEMP/releases-with-current.json"

      - name: Configure git author
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit snapshot update
        if: steps.detect.outputs.changed == 'true'
        run: |
          git add .
          git commit -F "${{ steps.release_meta.outputs.commit_message_path }}"

      - name: Push snapshot update
        if: steps.detect.outputs.changed == 'true'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create release
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_envelope.outputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.release_meta.outputs.release_name }}" \
            --notes-file "${{ steps.release_meta.outputs.release_notes_path }}" \
            "$RUNNER_TEMP/manifest.json#manifest.json"
