name: Archive Sync

on:
  workflow_call:
    inputs:
      source_url:
        required: true
        type: string
      site_name:
        required: true
        type: string
      site_url:
        required: true
        type: string
      repo_title:
        required: true
        type: string
      schedule_label:
        required: true
        type: string
      tool_ref:
        required: true
        type: string
      allowed_hosts:
        required: false
        type: string
        default: ""
      release_history_limit:
        required: false
        type: number
        default: 5
    secrets:
      tool_repo_token:
        required: false
      OPENAI_API_KEY:
        required: false

permissions:
  contents: write

concurrency:
  group: archive-sync-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODEX_MODEL: ${{ vars.CODEX_MODEL || 'gpt-5.4' }}
      CODEX_EFFORT: ${{ vars.CODEX_EFFORT || 'high' }}

    steps:
      - name: Check out archive repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Check out tool repository
        uses: actions/checkout@v5
        with:
          repository: llms-txt-archive/llmstxt
          ref: ${{ inputs.tool_ref }}
          path: .toolrepo
          fetch-depth: 1
          token: ${{ secrets.tool_repo_token || github.token }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version-file: .toolrepo/go.mod

      - name: Install tool binaries
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install ./cmd/crawler
          go install ./cmd/readmegen
        working-directory: .toolrepo

      - name: Copy workflow assets from tool repo
        run: |
          cp .toolrepo/templates/readme.md.tmpl "$RUNNER_TEMP/readme.md.tmpl"
          cp .toolrepo/.github/codex/prompts/docs-diff-summary.md "$RUNNER_TEMP/codex-docs-diff-summary.md"
          cp .toolrepo/.github/codex/schemas/docs-diff-summary.schema.json "$RUNNER_TEMP/codex-docs-diff-summary.schema.json"
          cp .toolrepo/.github/scripts/validate_codex_release.py "$RUNNER_TEMP/validate_codex_release.py"
          cp .toolrepo/.github/scripts/emit_codex_release_outputs.py "$RUNNER_TEMP/emit_codex_release_outputs.py"

      - name: Resolve latest release state
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=1" 2>/dev/null || echo '[]')"
          latest_tag="$(printf '%s' "$release_json" | jq -r '.[0].tag_name // ""')"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          printf '%s' "$release_json" > "$RUNNER_TEMP/latest-release.json"

          if [ -n "$latest_tag" ]; then
            mkdir -p "$RUNNER_TEMP/previous-release"
            gh release download "$latest_tag" -R "$GITHUB_REPOSITORY" -p manifest.json -D "$RUNNER_TEMP/previous-release" || true
          fi

      - name: Run crawler
        id: crawl
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          ALLOWED_HOSTS: ${{ inputs.allowed_hosts }}
        run: |
          manifest_args=()
          if [ -f "$RUNNER_TEMP/previous-release/manifest.json" ]; then
            manifest_args+=( -previous-manifest "$RUNNER_TEMP/previous-release/manifest.json" )
          fi
          if [ -n "$ALLOWED_HOSTS" ]; then
            manifest_args+=( -allowed-hosts "$ALLOWED_HOSTS" )
          fi

          set +e
          crawler \
            -source "$SOURCE_URL" \
            -out "$RUNNER_TEMP/generated" \
            -layout root \
            -manifest-out "$RUNNER_TEMP/manifest.json" \
            -diagnostics-dir "$RUNNER_TEMP/crawl-diagnostics" \
            -concurrency 8 \
            -timeout 30s \
            "${manifest_args[@]}" \
            > "$RUNNER_TEMP/crawl.stdout" \
            2> "$RUNNER_TEMP/crawl.stderr"
          exit_code=$?
          set -e

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ -f "$RUNNER_TEMP/manifest.json" ]; then
            echo "manifest_exists=true" >> "$GITHUB_OUTPUT"
            failure_count="$(jq -r '.failures | length' "$RUNNER_TEMP/manifest.json")"
            echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"
          else
            echo "manifest_exists=false" >> "$GITHUB_OUTPUT"
            echo "failure_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload crawl diagnostics
        if: steps.crawl.outputs.exit_code != '0' || steps.crawl.outputs.failure_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: archive-sync-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/crawl.stdout
            ${{ runner.temp }}/crawl.stderr
            ${{ runner.temp }}/manifest.json
            ${{ runner.temp }}/crawl-diagnostics

      - name: Stop on crawl failure
        if: steps.crawl.outputs.exit_code != '0'
        run: |
          echo "Crawler failed; diagnostics artifact uploaded."
          cat "$RUNNER_TEMP/crawl.stderr"
          exit 1

      - name: Sync raw generated files into repo root
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'README.md' \
            "$RUNNER_TEMP/generated"/ ./

      - name: Detect raw content changes
        id: detect
        run: |
          if [ -z "$(git status --porcelain -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo')" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Fetch release history
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_HISTORY_LIMIT: ${{ inputs.release_history_limit }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=${RELEASE_HISTORY_LIMIT}" > "$RUNNER_TEMP/releases.json"

      - name: Compute release envelope
        if: steps.detect.outputs.changed == 'true'
        id: release_envelope
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          LATEST_TAG: ${{ steps.release_state.outputs.latest_tag }}
        run: |
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ -z "$LATEST_TAG" ]; then
            codex_enabled="false"
            release_tag="initial"
          else
            codex_enabled="true"
            timestamp="$(date -u +"%Y%m%dT%H%M%SZ")"
            release_tag="archive-${timestamp}"
          fi

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"

          echo "codex_enabled=$codex_enabled" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

      - name: Prepare Codex input
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          SITE_NAME: ${{ inputs.site_name }}
          SITE_URL: ${{ inputs.site_url }}
          SOURCE_URL: ${{ inputs.source_url }}
          RELEASE_TAG: ${{ steps.release_envelope.outputs.release_tag }}
          PUBLISHED_AT: ${{ steps.release_envelope.outputs.published_at }}
        run: |
          mkdir -p "$RUNNER_TEMP/codex-input"

          git status --porcelain -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo' > "$RUNNER_TEMP/codex-input/archive-status.txt"
          git diff --stat -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo' > "$RUNNER_TEMP/codex-input/archive-diffstat.txt"
          git diff -- . ':(exclude).github' ':(exclude)README.md' ':(exclude).toolrepo' \
            | perl -0777 -pe 's/<!--.*?-->//gs' > "$RUNNER_TEMP/codex-input/archive-sanitized.patch"

          document_count="$(jq -r '.document_count' "$RUNNER_TEMP/manifest.json")"
          skipped_count="$(jq -r '.skipped_count // 0' "$RUNNER_TEMP/manifest.json")"
          failure_count="$(jq -r '.failures | length' "$RUNNER_TEMP/manifest.json")"

          jq -n \
            --arg repository "$REPOSITORY" \
            --arg site_name "$SITE_NAME" \
            --arg site_url "$SITE_URL" \
            --arg source_url "$SOURCE_URL" \
            --arg release_tag "$RELEASE_TAG" \
            --arg published_at "$PUBLISHED_AT" \
            --argjson document_count "$document_count" \
            --argjson skipped_count "$skipped_count" \
            --argjson failure_count "$failure_count" \
            '{
              repository: $repository,
              site_name: $site_name,
              site_url: $site_url,
              source_url: $source_url,
              release_tag: $release_tag,
              published_at: $published_at,
              document_count: $document_count,
              skipped_count: $skipped_count,
              failure_count: $failure_count
            }' > "$RUNNER_TEMP/codex-input/archive-context.json"

      - name: Upload Codex input bundle
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: archive-codex-input-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/codex-input/archive-status.txt
            ${{ runner.temp }}/codex-input/archive-diffstat.txt
            ${{ runner.temp }}/codex-input/archive-sanitized.patch
            ${{ runner.temp }}/codex-input/archive-context.json

      - name: Validate Codex configuration
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for non-initial archive releases." >&2
            exit 1
          fi

      - name: Run Codex release generation
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        uses: ./.toolrepo/.github/actions/codex-release-generate
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt_file: ${{ runner.temp }}/codex-docs-diff-summary.md
          output_file: ${{ runner.temp }}/codex-docs-summary.json
          working_directory: ${{ runner.temp }}/codex-input
          model: ${{ env.CODEX_MODEL }}
          effort: ${{ env.CODEX_EFFORT }}
          validator_script: ${{ runner.temp }}/validate_codex_release.py
          emitter_script: ${{ runner.temp }}/emit_codex_release_outputs.py
          schema_file: ${{ runner.temp }}/codex-docs-diff-summary.schema.json

      - name: Upload Codex outputs
        if: steps.detect.outputs.changed == 'true' && steps.release_envelope.outputs.codex_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: archive-codex-output-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/codex-docs-summary.json
            ${{ runner.temp }}/codex-commit-title.txt
            ${{ runner.temp }}/codex-commit-body.txt
            ${{ runner.temp }}/codex-release-title.txt
            ${{ runner.temp }}/codex-release-notes.md
            ${{ runner.temp }}/codex-key-changes.txt

      - name: Finalize release metadata
        if: steps.detect.outputs.changed == 'true'
        id: release_meta
        env:
          CODEX_ENABLED: ${{ steps.release_envelope.outputs.codex_enabled }}
        run: |
          commit_message_path="$RUNNER_TEMP/commit-message.txt"
          release_notes_path="$RUNNER_TEMP/release-notes.md"

          if [ "$CODEX_ENABLED" = "true" ]; then
            commit_subject="$(cat "$RUNNER_TEMP/codex-commit-title.txt")"
            commit_body="$(cat "$RUNNER_TEMP/codex-commit-body.txt")"
            release_name="$(cat "$RUNNER_TEMP/codex-release-title.txt")"
            cp "$RUNNER_TEMP/codex-release-notes.md" "$release_notes_path"
          else
            commit_subject="initial archive"
            commit_body=""
            release_name="Initial release"
            printf '## Summary\n\nInitial automated archive release.\n' > "$release_notes_path"
          fi

          {
            printf '%s\n' "$commit_subject"
            if [ -n "$commit_body" ]; then
              printf '\n%s\n' "$commit_body"
            fi
          } > "$commit_message_path"

          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "commit_message_path=$commit_message_path" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=$release_notes_path" >> "$GITHUB_OUTPUT"

      - name: Build README release context
        if: steps.detect.outputs.changed == 'true'
        env:
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_TAG: ${{ steps.release_envelope.outputs.release_tag }}
          PUBLISHED_AT: ${{ steps.release_envelope.outputs.published_at }}
          RELEASE_URL: ${{ steps.release_envelope.outputs.release_url }}
        run: |
          jq \
            --arg name "$RELEASE_NAME" \
            --arg tag "$RELEASE_TAG" \
            --arg published "$PUBLISHED_AT" \
            --arg url "$RELEASE_URL" \
            '([{
              name: $name,
              tag_name: $tag,
              published_at: $published,
              html_url: $url
            }] + .)' \
            "$RUNNER_TEMP/releases.json" > "$RUNNER_TEMP/releases-with-current.json"

      - name: Render generated README
        if: steps.detect.outputs.changed == 'true'
        env:
          REPO_TITLE: ${{ inputs.repo_title }}
          SITE_NAME: ${{ inputs.site_name }}
          SITE_URL: ${{ inputs.site_url }}
          SOURCE_URL: ${{ inputs.source_url }}
          SCHEDULE_LABEL: ${{ inputs.schedule_label }}
        run: |
          document_count="$(jq -r '.document_count' "$RUNNER_TEMP/manifest.json")"
          skipped_count="$(jq -r '.skipped_count // 0' "$RUNNER_TEMP/manifest.json")"

          readmegen \
            -template "$RUNNER_TEMP/readme.md.tmpl" \
            -out "README.md" \
            -title "$REPO_TITLE" \
            -site-name "$SITE_NAME" \
            -site-url "$SITE_URL" \
            -source-url "$SOURCE_URL" \
            -schedule-label "$SCHEDULE_LABEL" \
            -document-count "$document_count" \
            -skipped-count "$skipped_count" \
            -releases-json "$RUNNER_TEMP/releases-with-current.json"

      - name: Configure git author
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit archive update
        if: steps.detect.outputs.changed == 'true'
        env:
          COMMIT_MESSAGE_PATH: ${{ steps.release_meta.outputs.commit_message_path }}
        run: |
          git add -A -- . ':(exclude).github' ':(exclude).toolrepo'
          git commit -F "$COMMIT_MESSAGE_PATH"

      - name: Push archive update
        if: steps.detect.outputs.changed == 'true'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create release
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_envelope.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_NOTES_PATH: ${{ steps.release_meta.outputs.release_notes_path }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_NAME" \
            --notes-file "$RELEASE_NOTES_PATH" \
            "$RUNNER_TEMP/manifest.json#manifest.json"
