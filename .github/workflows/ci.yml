name: Tooling CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Verify module checksums
        run: go mod verify

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run helper script tests
        run: python3 -m unittest discover -s .github/scripts/tests -p 'test_*.py'

      - name: Install golangci-lint
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        run: golangci-lint run

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./... || true  # informational; stdlib vulns require Go upgrade

      - name: Install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: Run nilaway
        run: nilaway ./...
