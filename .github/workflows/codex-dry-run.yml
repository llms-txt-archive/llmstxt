name: Codex Docs Diff Dry Run

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run ID containing a claude-code-docs-diff artifact"
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  codex-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Codex auth configuration
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "Using OPENAI_API_KEY for Codex dry run."
            exit 0
          fi

          if [ -n "$CODEX_AUTH_JSON" ]; then
            echo "Using CODEX_AUTH_JSON for Codex dry run."
            exit 0
          fi

          echo "Configure OPENAI_API_KEY (recommended) or CODEX_AUTH_JSON (advanced ChatGPT/Codex account auth)." >&2
          exit 1

      - name: Download diff artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/docs-diff-artifact"
          gh run download "${{ inputs.run_id }}" --dir "$RUNNER_TEMP/docs-diff-artifact"

      - name: Resolve artifact directory
        id: artifact
        run: |
          artifact_dir="$(find "$RUNNER_TEMP/docs-diff-artifact" -mindepth 1 -maxdepth 1 -type d | head -n 1)"

          if [ -z "$artifact_dir" ]; then
            echo "No artifact directory found after download." >&2
            exit 1
          fi

          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
          find "$artifact_dir" -maxdepth 2 -type f | sort

      - name: Seed Codex home from ChatGPT auth
        if: env.CODEX_AUTH_JSON != ''
        run: |
          mkdir -p "$RUNNER_TEMP/codex-home"
          printf '%s' "$CODEX_AUTH_JSON" > "$RUNNER_TEMP/codex-home/auth.json"
          chmod 600 "$RUNNER_TEMP/codex-home/auth.json"

      - name: Run Codex dry run summary
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/docs-diff-summary.md
          output-file: codex-docs-summary.json
          sandbox: read-only
          safety-strategy: drop-sudo
          codex-home: ${{ runner.temp }}/codex-home
          codex-args: >-
            ["--model","gpt-5.4","--skip-git-repo-check","--ephemeral","--cd","${{ steps.artifact.outputs.artifact_dir }}","--output-schema","${{ github.workspace }}/.github/codex/schemas/docs-diff-summary.schema.json"]

      - name: Split structured outputs
        run: |
          jq -r '.commit_title' codex-docs-summary.json > codex-commit-title.txt
          jq -r '.commit_body' codex-docs-summary.json > codex-commit-body.txt
          jq -r '.release_title' codex-docs-summary.json > codex-release-title.txt
          jq -r '.release_notes_markdown' codex-docs-summary.json > codex-release-notes.md
          jq -r '.key_changes[]' codex-docs-summary.json > codex-key-changes.txt

      - name: Publish workflow summary
        run: |
          {
            echo "## Codex dry run"
            echo
            echo "**Commit title**"
            echo
            cat codex-commit-title.txt
            echo
            echo "**Release title**"
            echo
            cat codex-release-title.txt
            echo
            echo "**Key changes**"
            echo
            sed 's/^/- /' codex-key-changes.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Codex dry-run outputs
        uses: actions/upload-artifact@v4
        with:
          name: codex-dry-run-${{ inputs.run_id }}
          path: |
            codex-docs-summary.json
            codex-commit-title.txt
            codex-commit-body.txt
            codex-release-title.txt
            codex-release-notes.md
            codex-key-changes.txt
