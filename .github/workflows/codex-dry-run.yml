name: Codex Docs Diff Dry Run

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run ID containing an archive-codex-input artifact"
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  codex-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_MODEL: ${{ vars.CODEX_MODEL || 'gpt-5.4' }}
      CODEX_EFFORT: ${{ vars.CODEX_EFFORT || 'high' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Codex auth configuration
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "Using OPENAI_API_KEY for Codex dry run."
            exit 0
          fi

          if [ -n "$CODEX_AUTH_JSON" ]; then
            echo "Using CODEX_AUTH_JSON for Codex dry run."
            exit 0
          fi

          echo "Configure OPENAI_API_KEY (recommended) or CODEX_AUTH_JSON (advanced ChatGPT/Codex account auth)." >&2
          exit 1

      - name: Download diff artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          mkdir -p "$RUNNER_TEMP/docs-diff-artifact"
          gh run download "$RUN_ID" \
            --name "archive-codex-input-${RUN_ID}" \
            --dir "$RUNNER_TEMP/docs-diff-artifact"

      - name: Resolve artifact directory
        id: artifact
        env:
          RUN_ID: ${{ inputs.run_id }}
        run: |
          artifact_dir="$RUNNER_TEMP/docs-diff-artifact/archive-codex-input-${RUN_ID}"

          if [ ! -d "$artifact_dir" ]; then
            echo "No minimal Codex input artifact found after download." >&2
            exit 1
          fi

          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
          find "$artifact_dir" -maxdepth 2 -type f | sort

      - name: Seed Codex home from ChatGPT auth
        if: env.CODEX_AUTH_JSON != ''
        run: |
          mkdir -p "$RUNNER_TEMP/codex-home"
          printf '%s' "$CODEX_AUTH_JSON" > "$RUNNER_TEMP/codex-home/auth.json"
          chmod 600 "$RUNNER_TEMP/codex-home/auth.json"

      - name: Assemble Codex input bundle
        env:
          ARTIFACT_DIR: ${{ steps.artifact.outputs.artifact_dir }}
        run: |
          mkdir -p "$RUNNER_TEMP/codex-input"

          cp "$ARTIFACT_DIR/archive-status.txt" "$RUNNER_TEMP/codex-input/archive-status.txt"
          cp "$ARTIFACT_DIR/archive-diffstat.txt" "$RUNNER_TEMP/codex-input/archive-diffstat.txt"
          cp "$ARTIFACT_DIR/archive-sanitized.patch" "$RUNNER_TEMP/codex-input/archive-sanitized.patch"
          cp "$ARTIFACT_DIR/archive-context.json" "$RUNNER_TEMP/codex-input/archive-context.json"

      - name: Run Codex dry run summary
        uses: ./.github/actions/codex-release-generate
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt_file: .github/codex/prompts/docs-diff-summary.md
          working_directory: ${{ runner.temp }}/codex-input
          output_file: ${{ runner.temp }}/codex-docs-summary.json
          model: ${{ env.CODEX_MODEL }}
          effort: ${{ env.CODEX_EFFORT }}
          validator_script: .github/scripts/validate_codex_release.py
          emitter_script: .github/scripts/emit_codex_release_outputs.py

      - name: Split structured outputs
        run: |
          cp "$RUNNER_TEMP/codex-docs-summary.json" ./
          cp "$RUNNER_TEMP"/codex-commit-*.txt ./
          cp "$RUNNER_TEMP/codex-release-title.txt" ./
          cp "$RUNNER_TEMP/codex-release-notes.md" ./
          cp "$RUNNER_TEMP/codex-key-changes.txt" ./

      - name: Publish workflow summary
        run: |
          {
            echo "## Codex dry run"
            echo
            echo "**Commit title**"
            echo
            cat codex-commit-title.txt
            echo
            echo "**Release title**"
            echo
            cat codex-release-title.txt
            echo
            echo "**Key changes**"
            echo
            sed 's/^/- /' codex-key-changes.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Codex dry-run outputs
        uses: actions/upload-artifact@v4
        with:
          name: codex-dry-run-${{ inputs.run_id }}
          path: |
            codex-docs-summary.json
            codex-commit-title.txt
            codex-commit-body.txt
            codex-release-title.txt
            codex-release-notes.md
            codex-key-changes.txt
